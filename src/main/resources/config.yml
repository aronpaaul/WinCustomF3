# Обычный текст для F3, если анимация выключена.
#
# Поддерживается:
# - Стандартные коды через &: &0-&f, &k-&o, &r
# - Hex цвет: &#55FFFFТекст
# - Градиент: <gradient:#55FFFF:#FF55FF>Текст</gradient>
# - Стили внутри градиента: <gradient:#55FFFF:#FF55FF>&lТекст</gradient>
brand: "&b&lWin&d&lProxy"

animation:
  # Включает режим кадровой анимации.
  enabled: false

  # Интервал между кадрами в миллисекундах.
  #
  # Учти: F3 не будет плавно анимироваться у уже подключённого
  # игрока сам по себе. Этот кадр выбирается в момент, когда
  # клиент получает brand от backend-сервера.
  interval-ms: 500

  # Список кадров.
  # Каждый кадр поддерживает те же самые цвета, hex и градиенты.
  frames:
    - "&b&lWin&d&lProxy"
    - "<gradient:#55FFFF:#FF55FF>&lWinProxy</gradient>"
